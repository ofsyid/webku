<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri | Syid</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#eef2f7,#f9fbfd);
  color:#333;
}

/* HEADER */
header{
  background:linear-gradient(120deg,#0d6efd,#6610f2,#38bdf8);
  padding:25px;
  color:white;
  text-align:center;
}

header a{
  display:inline-block;
  margin-top:10px;
  padding:8px 18px;
  background:white;
  color:#0d6efd;
  border-radius:20px;
  text-decoration:none;
  font-size:14px;
}

/* SECTION */
section{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

/* GRID GALERI */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  cursor:pointer;
  transition:.4s;
  box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.gallery img:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  background:#020617;
  color:white;
  margin-top:40px;
}

/* RESPONSIVE */
@media(max-width:768px){
  header h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Galeri Project IoT</h1>
  <p>Kumpulan dokumentasi project saya</p>
  <a href="index.html">⬅ Kembali</a>
</header>

<section>

  <div class="gallery">

    <img src="https://via.placeholder.com/400x300" alt="Project 1">
    <img src="https://via.placeholder.com/400x300" alt="Project 2">
    <img src="https://via.placeholder.com/400x300" alt="Project 3">
   

  </div>

</section>

<footer>
  © 2025 Syid | IoT Developer
</footer>

<script>
// klik gambar jadi fullscreen
document.querySelectorAll('.gallery img').forEach(img=>{
  img.onclick=()=>{
    const overlay=document.createElement('div');
    overlay.style=`
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,.85);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:2000;
    `;
    const big=document.createElement('img');
    big.src=img.src;
    big.style="max-width:90%;border-radius:15px;";
    overlay.appendChild(big);
    overlay.onclick=()=>overlay.remove();
    document.body.appendChild(overlay);
  }
});
</script>

</body>
</html>
