<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Syid</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#eef2f7,#f9fbfd);
  color:#333;
}

/* NAVBAR BAWAH */
.navbar{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 30px);
  padding:15px;
  border-radius:25px;
  background:rgba(15,23,42,.9);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-around;
  z-index:1000;
}

.navbar a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:60px 20px 120px;
}

/* HEADER */
.title{
  text-align:center;
  margin-bottom:40px;
}

.title h1{
  font-size:32px;
}

/* CARD */
.card{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:15px;
}

input, textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

textarea{
  resize:none;
  height:120px;
}

button{
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#0d6efd,#6610f2);
  color:white;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:translateY(-3px);
}

/* CONTACT INFO */
.info{
  margin-top:25px;
  line-height:1.8;
}

/* EMAIL BUTTON */
.email-btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border-radius:25px;
  background:#0d6efd;
  color:white;
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .title h1{
    font-size:24px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    <h1>Hubungi Saya</h1>
    <p>Silakan kirim pesan atau hubungi langsung</p>
  </div>

  <div class="card">
    
    <!-- FORM -->
    <form>
      <input type="text" placeholder="Nama kamu" required>
      <input type="email" placeholder="Email kamu" required>
      <textarea placeholder="Pesan..." required></textarea>
      <button type="submit">Kirim Pesan</button>
    </form>

    <!-- INFO -->
    <div class="info">
      <p>📧 Email: rasyiid@raharja.info</p>
      <p>📍 Indonesia</p>

      <!-- EMAIL DIRECT -->
      <a href="mailto:rasyiid@raharja.info?subject=Kontak%20Dari%20Portfolio&body=Halo%20Rasyid,"
         class="email-btn">
         Kirim Email Langsung
      </a>
    </div>

  </div>

</div>

<!-- NAVBAR -->
<header class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="project-iot.html">Project</a>
  <a href="contact.html">Contact</a>
</header>

</body>
</html>
